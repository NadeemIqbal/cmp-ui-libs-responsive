name: Publish to Maven Central

on:
  push:
    tags:
      - 'v*'
  release:
    types: [released, prereleased]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (overrides gradle.properties)'
        required: false

permissions:
  contents: write

jobs:
  publish:
    name: Release build and publish
    runs-on: macos-latest

    steps:
    - name: Check out code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # needed so we can commit-back Package.swift updates
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'zulu'

    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
          ~/.konan
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Make gradlew executable
      run: chmod +x ./gradlew

    - name: Resolve publish version
      id: version
      run: |
        if [ -n "${{ inputs.version }}" ]; then
          VERSION="${{ inputs.version }}"
        elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
          VERSION="${GITHUB_REF#refs/tags/v}"
        else
          VERSION="$(grep -E '^version=' gradle.properties | cut -d= -f2)"
        fi
        echo "Publishing version: $VERSION"
        echo "version=$VERSION" >> "$GITHUB_OUTPUT"

    # No separate Build and Test step — the publish task transitively assembles
    # everything it needs. Tests have their own workflow (ci.yml). This keeps
    # publish robust against transient network failures in test-runner setup
    # (e.g. JetBrains Space 503s when fetching Node for wasmJsBrowserTest).

    - name: Publish to Maven Central
      run: ./gradlew publishAndReleaseToMavenCentral -Pversion=${{ steps.version.outputs.version }} --no-configuration-cache --no-daemon --stacktrace
      env:
        ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
        ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
        ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNING_KEY_ID }}
        ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_PASSWORD }}
        ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_KEY_CONTENTS }}
        GRADLE_OPTS: -Dorg.gradle.daemon=false

    - name: Build release XCFramework
      run: ./gradlew :responsive-ui:assembleResponsiveUIReleaseXCFramework -Pversion=${{ steps.version.outputs.version }} --no-daemon --stacktrace

    - name: Zip XCFramework + compute SHA-256
      id: xcframework
      run: |
        cd responsive-ui/build/XCFrameworks/release
        zip -r ResponsiveUI.xcframework.zip ResponsiveUI.xcframework
        SHA=$(swift package compute-checksum ResponsiveUI.xcframework.zip || shasum -a 256 ResponsiveUI.xcframework.zip | awk '{print $1}')
        echo "Computed SHA-256: $SHA"
        echo "sha=$SHA" >> "$GITHUB_OUTPUT"
        echo "zip_path=responsive-ui/build/XCFrameworks/release/ResponsiveUI.xcframework.zip" >> "$GITHUB_OUTPUT"

    - name: Create GitHub Release with XCFramework attached
      if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'release' || github.event_name == 'workflow_dispatch'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ steps.version.outputs.version }}
        generate_release_notes: true
        files: ${{ steps.xcframework.outputs.zip_path }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Update Package.swift with new URL + checksum and commit back
      if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'release' || github.event_name == 'workflow_dispatch'
      run: |
        VERSION="${{ steps.version.outputs.version }}"
        SHA="${{ steps.xcframework.outputs.sha }}"
        NEW_URL="https://github.com/NadeemIqbal/cmp-ui-libs-responsive/releases/download/v${VERSION}/ResponsiveUI.xcframework.zip"

        # Update URL line
        sed -i.bak -E "s|url: \"https://github.com/NadeemIqbal/cmp-ui-libs-responsive/releases/download/v[^/]+/ResponsiveUI.xcframework.zip\"|url: \"${NEW_URL}\"|" Package.swift
        # Update checksum line (any 64-hex-char value)
        sed -i.bak -E "s|checksum: \"[0-9a-f]{64}\"|checksum: \"${SHA}\"|" Package.swift
        rm Package.swift.bak

        # Configure git for the bot commit
        git config user.name  "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

        # Only commit + push if Package.swift actually changed
        if ! git diff --quiet Package.swift; then
          git add Package.swift
          git commit -m "Update Package.swift for v${VERSION} [skip ci]"
          # Push to default branch — the tag itself stays where it is
          git push origin HEAD:master
          echo "✓ Package.swift updated for v${VERSION}"
        else
          echo "Package.swift already up-to-date for v${VERSION}"
        fi
