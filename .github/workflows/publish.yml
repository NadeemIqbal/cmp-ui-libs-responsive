name: Publish to Maven Central

on:
  push:
    tags:
      - 'v*'
  release:
    types: [released, prereleased]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (overrides gradle.properties)'
        required: false

permissions:
  contents: write

jobs:
  publish:
    name: Release build and publish
    runs-on: macos-latest

    steps:
    - name: Check out code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'zulu'

    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
          ~/.konan
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Make gradlew executable
      run: chmod +x ./gradlew

    - name: Resolve publish version
      id: version
      run: |
        if [ -n "${{ inputs.version }}" ]; then
          VERSION="${{ inputs.version }}"
        elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
          VERSION="${GITHUB_REF#refs/tags/v}"
        else
          VERSION="$(grep -E '^version=' gradle.properties | cut -d= -f2)"
        fi
        echo "Publishing version: $VERSION"
        echo "version=$VERSION" >> "$GITHUB_OUTPUT"

    # No separate Build and Test step — the publish task transitively assembles
    # everything it needs. Tests have their own workflow (ci.yml). This keeps
    # publish robust against transient network failures in test-runner setup
    # (e.g. JetBrains Space 503s when fetching Node for wasmJsBrowserTest).

    - name: Publish to Maven Central
      run: ./gradlew publishAndReleaseToMavenCentral -Pversion=${{ steps.version.outputs.version }} --no-configuration-cache --no-daemon --stacktrace
      env:
        ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
        ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
        ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNING_KEY_ID }}
        ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_PASSWORD }}
        ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_KEY_CONTENTS }}
        GRADLE_OPTS: -Dorg.gradle.daemon=false

    - name: Create Release Notes
      if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'release'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ steps.version.outputs.version }}
        generate_release_notes: true
        files: |
          responsive-ui/build/XCFrameworks/release/*.zip
          responsive-ui/build/XCFrameworks/release/*/*.xcframework
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
