name: CI

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]
  workflow_call:

permissions:
  contents: read

jobs:
  test:
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: "Desktop tests"
            target: ":responsive-ui:desktopTest :responsive-ui-testing:desktopTest"
            os: ubuntu-latest
          - name: "Android unit tests"
            target: ":responsive-ui:test"
            os: ubuntu-latest
          - name: "iOS simulator tests"
            target: ":responsive-ui:iosSimulatorArm64Test :responsive-ui-testing:iosSimulatorArm64Test"
            os: macos-latest
          # Compile-only for Wasm: the browser *test runner* downloads Node from
          # a JetBrains mirror that intermittently 503s. Compilation needs no
          # Node, so this verifies the wasm target builds without the flake.
          # The full wasmJsBrowserTest is run locally / can be re-added with an
          # actions/setup-node step once that mirror is reliable.
          - name: "Wasm/JS compile"
            target: ":responsive-ui:compileKotlinWasmJs :responsive-ui-testing:compileKotlinWasmJs"
            os: ubuntu-latest
    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Validate Gradle Wrapper
      uses: gradle/actions/wrapper-validation@v3
      continue-on-error: true

    - name: Cache Kotlin Konan
      uses: actions/cache@v4
      with:
        path: |
          ~/.konan
        key: ${{ runner.os }}-konan-${{ hashFiles('**/gradle/libs.versions.toml') }}
        restore-keys: |
          ${{ runner.os }}-konan-

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'zulu'

    - name: Make gradlew executable
      run: chmod +x ./gradlew

    - name: Build with Gradle
      uses: gradle/gradle-build-action@v3
      with:
        arguments: ${{ matrix.target }} --no-daemon --stacktrace
      env:
        GRADLE_OPTS: -Dorg.gradle.daemon=false

  sample-builds:
    name: Build :example sample app
    runs-on: macos-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'zulu'

    - name: Make gradlew executable
      run: chmod +x ./gradlew

    - name: Cache Kotlin Konan
      uses: actions/cache@v4
      with:
        path: |
          ~/.konan
        key: ${{ runner.os }}-konan-${{ hashFiles('**/gradle/libs.versions.toml') }}

    - name: Assemble Android
      run: ./gradlew :example:assembleDebug --no-daemon --stacktrace
      env:
        GRADLE_OPTS: -Dorg.gradle.daemon=false

    - name: Package desktop distribution
      run: ./gradlew :example:packageDistributionForCurrentOS --no-daemon --stacktrace
      env:
        GRADLE_OPTS: -Dorg.gradle.daemon=false

    - name: Link iOS framework
      run: ./gradlew :example:linkDebugFrameworkIosSimulatorArm64 --no-daemon --stacktrace
      env:
        GRADLE_OPTS: -Dorg.gradle.daemon=false
